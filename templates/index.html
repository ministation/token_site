<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>{{ title }}</h1>
            <div class="theme-switch">
                <span>☀️</span>
                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider"></span>
                </label>
                <span>🌙</span>
            </div>
            <div id="auth-section">
                <button id="loginBtn" onclick="login()">Войти через Discord</button>
                <div id="userPanel" style="display:none">
                    <span id="userName"></span>
                    <button onclick="logout()">Выйти</button>
                </div>
            </div>
        </header>

        <main>
            <!-- Привязка аккаунта (если не привязан) -->
            <div id="linkSection" class="card" style="display:none">
                <h2>Привязка игрового аккаунта</h2>
                <p>Введите ваш UUID из игры (можно узнать в настройках)</p>
                <input type="text" id="uuidInput" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
                <button onclick="linkPlayer()">Привязать</button>
                <div id="linkResult"></div>
            </div>

            <!-- Баланс (если привязан) -->
            <div id="balanceSection" class="card" style="display:none">
                <h2>Ваш баланс</h2>
                <div id="balanceDisplay"></div>
            </div>
        </main>
    </div>

    <script src="/static/script.js"></script>
    <script>
        // Инициализация темы
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        themeToggle.checked = savedTheme === 'dark';
        themeToggle.addEventListener('change', () => {
            const theme = themeToggle.checked ? 'dark' : 'light';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });
    </script>
</body>
</html>
