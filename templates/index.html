<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-станция</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/coin.png">
</head>
<body class="dark">
    <div class="app">
        <!-- Левая боковая панель -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="/static/logo.png" alt="Мини-станция" class="logo">
                <span class="logo-text">Мини-станция</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="home"><i class="icon">🏠</i><span>Главная</span></li>
                <li class="nav-item" data-page="messages"><i class="icon">📨</i><span>Сообщения</span><span class="badge" id="unreadMessagesBadge" style="display:none;">0</span></li>
                <li class="nav-item" data-page="friends"><i class="icon">👥</i><span>Друзья</span></li>
                <li class="nav-item" data-page="wallet"><i class="icon">💰</i><span>Кошелёк</span></li>
                <li class="nav-item" data-page="bank"><i class="icon">🏦</i><span>Банк</span></li>
                <li class="nav-item" data-page="lottery"><i class="icon">🎰</i><span>Лотерея</span></li>
                <li class="nav-item" data-page="search"><i class="icon">🔍</i><span>Поиск</span></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info" id="sidebarUserInfo">
                    <!-- Заполняется JS -->
                </div>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </nav>

        <!-- Основной контент -->
        <main class="content" id="contentArea">
            <!-- Здесь будут динамически подгружаться страницы -->
            <!-- По умолчанию - лента -->
            <div id="page-home" class="page-container active"></div>
            <div id="page-messages" class="page-container"></div>
            <div id="page-friends" class="page-container"></div>
            <div id="page-wallet" class="page-container"></div>
            <div id="page-bank" class="page-container"></div>
            <div id="page-lottery" class="page-container"></div>
            <div id="page-search" class="page-container"></div>
            <div id="page-profile" class="page-container"></div>
        </main>

        <!-- Правая боковая панель (инфо) -->
        <aside class="right-sidebar">
            <div class="card balance-card" id="miniBalanceCard">
                <h3>💰 Баланс</h3>
                <div class="balance-value" id="miniBalance">0</div>
                <button class="btn btn-primary btn-sm" onclick="app.navigateTo('wallet')">Пополнить</button>
            </div>
            <div class="card stats-card">
                <h3>📊 Статистика</h3>
                <div class="stat-row"><span>Игроков:</span><span id="statPlayers">-</span></div>
                <div class="stat-row"><span>Монет в обороте:</span><span id="statTokens">-</span></div>
                <div class="stat-row"><span>Вкладов:</span><span id="statDeposits">-</span></div>
                <div class="stat-row"><span>Займов:</span><span id="statLoans">-</span></div>
            </div>
            <div class="card online-friends">
                <h3>👥 Друзья онлайн</h3>
                <div id="onlineFriendsList">Загрузка...</div>
            </div>
        </aside>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal" style="display:none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="/static/theme.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
