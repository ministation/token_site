<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-станция</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="/static/logo.png" alt="Мини-станция">
            <h1>Мини-станция</h1>
        </div>
        <div class="header-controls">
            <button id="themeToggle" class="theme-btn">🌙</button>
            <div id="userInfo"></div>
        </div>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" data-page="home">Главная</button>
        <button class="nav-tab" data-page="chat">💬 Чат</button>
        <button class="nav-tab" data-page="messages">📨 Сообщения</button>
        <button class="nav-tab" data-page="friends">👥 Друзья</button>
        <button class="nav-tab" data-page="profile">👤 Профиль</button>
        <button class="nav-tab" data-page="bank">Банк</button>
        <button class="nav-tab" data-page="lottery">🎰 Лотерея</button>
        <button class="nav-tab" data-page="top">Топ</button>
    </nav>

    <main class="container">
        <!-- Контент страниц будет загружаться динамически через JS -->
        <div id="pageContent"></div>
    </main>

    <script src="/static/theme.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
