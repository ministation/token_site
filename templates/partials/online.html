    <h2>Статистика онлайна сервера</h2>
    
    <div class="chart-controls" style="display: flex; gap: 8px; margin-bottom: 16px;">
        <button class="chart-tab active" onclick="switchOnlineMode('day')">День</button>
        <button class="chart-tab" onclick="switchOnlineMode('week')">Неделя</button>
        <button class="chart-tab" onclick="switchOnlineMode('month')">Месяц</button>
        <input type="date" id="dayPicker" style="display:none; margin-left: auto;" onchange="loadDailyOnline(this.value)">
    </div>
    
    <canvas id="onlineChart" width="400" height="200"></canvas>
    <p style="text-align: center; color: #888; font-size: 0.85em; margin-top: 8px;">
        Данные обновляются каждые 5 минут. Средний и пиковый онлайн.
    </p>
</div>
