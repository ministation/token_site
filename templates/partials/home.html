<!-- Статус сервера -->
<div class="server-status-card" id="serverStatus">
    <div class="server-status-header">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusName">Загрузка...</span>
    </div>
    <div class="server-players">
        <span id="statusPlayers">0</span>/<span id="statusMax">100</span> игроков
    </div>
    <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="server-info-row">
        <span>🗺️ <span id="statusMap">-</span></span>
        <span>🎯 <span id="statusPreset">-</span></span>
    </div>
</div>

<div class="playtime-chart" id="playtimeChart">
    <h3>Статистика игроков</h3>
    <canvas id="playtimeCanvas"></canvas>
</div>

<div class="card create-post-card">
    <h2>Новый пост</h2>
    <div class="post-form">
        <textarea id="postContent" placeholder="Что у вас нового?"></textarea>
        <input type="file" id="postImage" accept="image/*">
        <label for="postImage" class="image-upload-label">📎 Добавить фото</label>
        <div id="imagePreview" class="image-preview"></div>
        <button onclick="createPost()">Опубликовать</button>
    </div>
</div>
<div id="feedContainer"></div>
